<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    
    <title>V-Gap Ultra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container" id="mainApp">
  <div class="top-nav">
    <div class="logo-area">
      <div class="logo-icon">V</div>
      <span class="logo-text">Gap</span>
    </div>
    <div class="nav-right">
      <span id="liveIndicator" class="live-tag">LIVE</span>
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
  </div>

  <div class="header">
    <div class="timestamp" id="lastUpdate">Actualizando...</div>
    <div class="gap-group tooltip">
      <div id="brechaBadge" class="gap-badge">0.00%</div>
      <div id="factorBadge" class="factor-text">1.00x</div>
      <span class="tooltiptext">Diferencia porcentual y factor entre Binance y BCV.</span>
    </div>
  </div>

  <div class="input-grid">
    <div class="input-field bcv-field" id="bcvContainer">
      <div class="label-row">
        <label class="tooltip">
          <svg viewBox="0 0 100 100" class="mini-icon bcv-logo">
            <circle cx="50" cy="50" r="50" fill="#0A3B7C"/>
            <circle cx="50" cy="50" r="42" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
            <text x="50" y="62" text-anchor="middle" fill="#FFFFFF" font-size="32" font-family="Times New Roman, serif" font-weight="bold" letter-spacing="1">BCV</text>
          </svg>
          BCV ⓘ <span class="tooltiptext">Tasa oficial del Banco Central.</span>
        </label>
        <div class="controls">
          <button class="icon-btn" onclick="fetchRates()">↺</button>
          <button id="lockBtn" class="lock-btn" onclick="toggleManual()">🔒</button>
        </div>
      </div>
      <input type="number" id="rateBcv" inputmode="decimal" step="0.01" disabled>
    </div>

    <div class="input-field" id="binanceContainer">
      <div class="label-row">
        <label class="tooltip">
          <svg viewBox="0 0 24 24" class="mini-icon binance-logo">
            <path fill="#F3BA2F" d="M11.996 9.604L9.593 12l2.403 2.396L14.4 12l-2.404-2.396zM11.996 2.396L16.8 7.2l-2.402 2.404-2.402-2.404-2.403 2.404L7.19 7.2l4.806-4.804zM16.8 16.8l2.402-2.404L21.604 12l-2.402-2.404-2.404 2.404 2.404 2.404L16.8 16.8zm-9.604 0L4.793 14.4l2.403-2.404L4.793 9.592 2.39 12l2.403 2.404L7.196 16.8zm4.8 4.804L7.19 16.8l2.403-2.404 2.403 2.404 2.402-2.404L16.8 16.8l-4.804 4.8z"/>
          </svg>
          BINANCE ⓘ <span class="tooltiptext">Tasa P2P Venta USDT.</span>
        </label>
        <div class="controls">
          <button class="icon-btn tooltip" id="btnBinFetch" onclick="fetchBinance()">↺ <span class="tooltiptext">Tasa API Binance</span></button>
          <button class="icon-btn tooltip" onclick="undoBinance()">↩️ <span class="tooltiptext">Volver a tu tasa</span></button>
        </div>
      </div>
      <input type="number" id="rateBinance" inputmode="decimal" step="0.01">
    </div>

    <div class="input-field">
      <label class="tooltip">$ BCV ⓘ <span class="tooltiptext">Dólares a tasa oficial.</span></label>
      <input type="number" id="inputUsd" inputmode="decimal" placeholder="0.00">
    </div>
    
    <div class="input-field highlight-border">
      <label class="tooltip">USDT ⓘ <span class="tooltiptext">Cripto dólares (Inc. comisión 0.06).</span></label>
      <input type="number" id="inputUsdt" inputmode="decimal" placeholder="0.00">
    </div>

    <div class="input-field full-width">
      <div class="label-row">
        <label class="tooltip">BOLÍVARES (Bs) ⓘ <span class="tooltiptext">Monto total en moneda nacional.</span></label>
        <button class="icon-btn-copy" onclick="copyInputBs()">📋</button>
      </div>
      <input type="number" id="inputBs" inputmode="decimal" placeholder="0.00">
    </div>
  </div>

  <button class="btn-clear" onclick="resetAll()">Limpiar Todo</button>

  <div class="result-card">
    <p class="card-title">RECIBES NETO</p>
    <h2 id="bigBsDisplay">0,00 Bs</h2>
    <button class="btn-copy-elegant" onclick="copyToClipboard()">
      <span>COPIAR MONTO</span>
    </button>
    <div class="vender-info">
      Poder de compra: <strong id="powerUsd">0.00</strong> <span class="usd-label tooltip">$ BCV ⓘ <span class="tooltiptext">Valor real de tus Bs a tasa oficial.</span></span>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
